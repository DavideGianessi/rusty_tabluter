<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>9x9 Bitboard Maker</title>
<style>
  body {
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 20px;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(9, 40px);
    grid-template-rows: repeat(9, 40px);
    gap: 4px;
    margin-bottom: 20px;
  }

  .cell {
    width: 40px;
    height: 40px;
    border: 1px solid #444;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    font-size: 12px;
  }

  .on {
    background: #4caf50;
    color: white;
  }

  .off {
    background: #eee;
  }

  #result {
    font-family: monospace;
    word-break: break-all;
    max-width: 700px;
    text-align: center;
  }

  #indices {
    font-family: monospace;
    margin-top: 10px;
  }
</style>
</head>
<body>

<h2>9×9 Bitboard Builder</h2>

<div id="grid"></div>

<div id="result">
<strong>Total:</strong>
<div id="value">0</div>
</div>

<div id="indices">
<strong>Set bit indices:</strong>
<div id="setbits"></div>
</div>

<script>
const grid = document.getElementById("grid");
const valueEl = document.getElementById("value");
const setBitsEl = document.getElementById("setbits");

const SIZE = 9;
const cells = [];

for (let r = 0; r < SIZE; r++) {
  for (let c = 0; c < SIZE; c++) {
    const div = document.createElement("div");
    div.className = "cell off";
    div.dataset.row = r;
    div.dataset.col = c;
    div.dataset.state = "0";

    const i = r * SIZE + c;
    div.textContent = i;

    div.addEventListener("click", () => {
      div.dataset.state = div.dataset.state === "1" ? "0" : "1";
      div.classList.toggle("on");
      div.classList.toggle("off");
      updateValue();
    });

    grid.appendChild(div);
    cells.push(div);
  }
}

function updateValue() {
  let total = 0n;
  let indices = [];

  for (const cell of cells) {
    if (cell.dataset.state === "1") {
      const r = Number(cell.dataset.row);
      const c = Number(cell.dataset.col);
      const i = r * SIZE + c;

      total += (1n << BigInt(i));
      indices.push(i);
    }
  }

  valueEl.textContent = total.toString();
  setBitsEl.textContent = indices.join(", ");
}

updateValue();
</script>

</body>
</html>
